<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西门子仪表故障根因分析知识库 | Siemens RCA Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a5f 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .siemens-accent {
            background: linear-gradient(135deg, #009999 0%, #007acc 100%);
        }
        
        .fault-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .fault-card:hover {
            transform: translateY(-2px);
            border-color: #009999;
            box-shadow: 0 10px 30px rgba(0, 153, 153, 0.2);
        }
        
        .fault-card.active {
            border-color: #009999;
            background: rgba(0, 153, 153, 0.1);
        }
        
        .severity-critical { border-left: 4px solid #ef4444; }
        .severity-high { border-left: 4px solid #f59e0b; }
        .severity-medium { border-left: 4px solid #eab308; }
        .severity-low { border-left: 4px solid #22c55e; }
        
        .root-cause-tag {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.2) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        .action-tag {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.2) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        
        .prevention-tag {
            background: linear-gradient(135deg, rgba(0, 153, 153, 0.2) 0%, rgba(0, 122, 204, 0.2) 100%);
            border: 1px solid rgba(0, 153, 153, 0.3);
            color: #5eead4;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #009999 0%, #007acc 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .check-item {
            transition: all 0.2s;
        }
        
        .check-item:hover {
            background: rgba(0, 153, 153, 0.1);
            transform: translateX(5px);
        }
        
        .probability-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(71, 85, 105, 0.5);
            overflow: hidden;
        }
        
        .probability-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .tool-tip {
            position: relative;
            cursor: help;
        }
        
        .tool-tip:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 50;
            border: 1px solid rgba(71, 85, 105, 0.5);
        }
        
        .siemens-logo {
            background: linear-gradient(135deg, #009999 0%, #007acc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @media print {
            .no-print { display: none; }
            .glass-panel { background: white !important; color: black !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-8 no-print">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <div class="flex items-center space-x-4 mb-4 md:mb-0">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#009999] to-[#007acc] flex items-center justify-center shadow-lg shadow-cyan-500/30">
                    <span class="text-white font-bold text-2xl">S</span>
                </div>
                <div>
                    <h1 class="text-3xl font-bold siemens-logo">
                        西门子仪表故障根因分析知识库
                    </h1>
                    <p class="text-slate-400 text-sm">Siemens SITRANS & SIPART Root Cause Analysis Database</p>
                </div>
            </div>
            
            <div class="flex space-x-3">
                <select id="category-filter" onchange="filterFaults()" class="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-[#009999]">
                    <option value="all">全部仪表类型</option>
                    <option value="temp">温度变送器 (SITRANS TF)</option>
                    <option value="pressure">压力变送器 (SITRANS P)</option>
                    <option value="magflow">电磁流量计 (SITRANS F M)</option>
                    <option value="massflow">质量流量计 (SITRANS F C)</option>
                    <option value="radar">雷达物位计 (SITRANS LR)</option>
                    <option value="ultra">超声波物位计 (SITRANS LU)</option>
                    <option value="positioner">阀门定位器 (SIPART PS2)</option>
                </select>
                <button onclick="exportReport()" class="px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg text-sm hover:bg-slate-700 transition-all">
                    <i class="fas fa-download mr-2"></i>导出
                </button>
                <button onclick="window.print()" class="px-4 py-2 bg-[#009999] hover:bg-[#007acc] rounded-lg text-sm text-white transition-all">
                    <i class="fas fa-print mr-2"></i>打印
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left: Fault List -->
        <div class="lg:col-span-1 space-y-4 no-print" id="fault-list">
            <!-- Generated by JS -->
        </div>

        <!-- Right: Detail View -->
        <div class="lg:col-span-2">
            <div id="detail-panel" class="glass-panel rounded-2xl p-6 min-h-[600px]">
                <div class="flex flex-col items-center justify-center h-full text-slate-500">
                    <i class="fas fa-hand-point-left text-4xl mb-4"></i>
                    <p>请点击左侧故障条目查看详细根因分析</p>
                    <p class="text-sm mt-2 text-slate-600">或向下滚动查看全部故障</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Print View: All Faults -->
    <div class="max-w-7xl mx-auto mt-8 space-y-8 print-only" id="print-content" style="display:none;">
        <!-- Populated by JS for printing -->
    </div>

    <script>
        // 西门子仪表故障知识库（完整数据）
        const faultDatabase = [
            // 温度变送器
            {
                id: 'temp-open',
                category: 'temp',
                code: 'SENSOR-OPEN',
                title: '温度传感器开路/断路故障',
                severity: 'critical',
                instrument: 'SITRANS TF/TR 温度变送器',
                frequency: '高',
                rootCauses: [
                    {
                        type: '传感器故障',
                        probability: 40,
                        causes: [
                            '热电阻丝断裂：Pt100引线因振动疲劳断裂（尤其高温高压场合）',
                            '接线端子氧化：潮湿环境导致接线柱腐蚀接触不良',
                            '铠装层破损：机械损伤导致内部芯线断裂',
                            '热点偶断偶：K型热电偶长期处于高温脆化'
                        ]
                    },
                    {
                        type: '线路问题',
                        probability: 35,
                        causes: [
                            '补偿导线断线：热电偶延长线中间断裂（常见于穿管处）',
                            '接线松动：端子排螺丝未拧紧，热胀冷缩后脱落',
                            '电缆绝缘破损：信号线对地短路被误判为开路',
                            '雷击过压：感应雷导致输入保护元件熔断'
                        ]
                    },
                    {
                        type: '组态错误',
                        probability: 20,
                        causes: [
                            '传感器类型错选：组态为热电偶实际接热电阻',
                            '接线方式错误：三线制接成两线制导致检测电路异常',
                            '量程超限：超出传感器范围（如Pt100>850℃）触发保护'
                        ]
                    },
                    {
                        type: '模块故障',
                        probability: 5,
                        causes: [
                            '输入通道损坏：A/D转换器前端保护二极管击穿',
                            '冷端补偿故障：内置温度传感器失效（热电偶模式）'
                        ]
                    }
                ],
                diagnosis: {
                    steps: [
                        { 
                            title: '电阻测量', 
                            detail: '断电测量Pt100：0℃应为100Ω，每1℃约0.385Ω变化。开路显示∞，短路显示<10Ω。热电偶应<100Ω（不含补偿线）。',
                            tool: '精密万用表/电桥'
                        },
                        { 
                            title: '线路通断', 
                            detail: '在变送器端子处测量：断开传感器，短接远端，测通断。检查补偿导线：K型应为mV级信号，无断点。',
                            tool: '万用表通断档'
                        },
                        { 
                            title: '组态核查', 
                            detail: '使用SIMATIC PDM或手操器检查：Sensor Type（Pt100/K/T）、Connection（2/3/4-wire）、Range。',
                            tool: 'HART手操器/PDM'
                        },
                        { 
                            title: '替换验证', 
                            detail: '用已知良好的传感器接入，如正常则确认原传感器故障；如仍开路则检查变送器输入通道。',
                            tool: '备用传感器'
                        }
                    ]
                },
                solutions: {
                    immediate: [
                        '如工艺允许，切换至备用测温点或临时使用便携式红外测温',
                        '检查接线端子：重新拧紧螺丝，清洁氧化层（砂纸打磨）',
                        '短接测试：将变送器输入端短接，观察是否显示超下限（确认变送器正常）'
                    ],
                    repair: [
                        '热电阻修复：如引线断裂，可剥开保护管重新焊接（需干燥环境）',
                        '更换传感器：订购同分度号传感器（注意：插入深度、连接螺纹、防爆等级）',
                        '补偿线接续：使用对应分度号补偿导线中间接头（K型用KX，不能接反）',
                        '模块更换：SITRANS TF电子模块可现场更换（注意组态备份）'
                    ],
                    prevention: [
                        '选用铠装热电偶/热电阻：抗振动性能优于装配式',
                        '避免弯折：补偿导线弯曲半径>50mm，防止芯线疲劳',
                        '定期检查：每季度检查端子排紧固情况（热胀冷缩易松）',
                        '防雷保护：信号线加装信号避雷器（如菲尼克斯PT系列）'
                    ]
                },
                cost: { field: 300, factory: 1500, savings: '现场焊接引线节约80%（vs更换整支传感器）' }
            },
            {
                id: 'temp-drift',
                category: 'temp',
                code: 'TEMP-DRIFT',
                title: '温度测量漂移/不准',
                severity: 'medium',
                instrument: 'SITRANS TF 温度变送器',
                frequency: '中',
                rootCauses: [
                    {
                        type: '传感器老化',
                        probability: 30,
                        causes: [
                            'Pt100漂移：长期使用后R0偏离100Ω（>0.05%）',
                            '热电偶退化：K型在>800℃长期使用后正极氧化，电动势降低',
                            '护套渗碳：金属保护管渗碳导致Pt100污染阻值升高'
                        ]
                    },
                    {
                        type: '线路误差',
                        probability: 25,
                        causes: [
                            '引线电阻：两线制连接时导线电阻未补偿（每10m约1Ω=2.6℃误差）',
                            '补偿导线错用：K型热电偶使用E型补偿线，产生附加电势',

                        ]
                    },
                    {
                        type: '干扰问题',
                        probability: 20,
                        causes: [
                            '电磁干扰：变频器附近未屏蔽，50Hz工频干扰',

                    },
                    {
                        type: '安装问题',
                        probability: 15,
                        causes: [
                            '插入深度不足：未达管道中心（流速最大处温度最具代表性）',
                            '热传导误差：保护管外露部分过长，沿热传导损失',
                            '响应迟缓：保护管太厚或填充物干燥（时间常数增大）'
                        ]
                    },
                    {
                        type: '校准失效',
                        probability: 10,
                        causes: [
                            '变送器漂移：4-20mA输出漂移（电子元件老化）',
                            '组态迁移：误操作导致零点/量程被修改'
                        ]
                    }
                ],
                diagnosis: {
                    steps: [
                        { 
                            title: '比对测试', 
                            detail: '使用标准温度计（如二等标准铂电阻）并排放置，对比测量值。偏差>允许误差（如Pt100 A级±0.15℃）则异常。',
                            tool: '标准温度计'
                        },
                        { 
                            title: '线路检查', 
                            detail: '检查接线方式：Pt100应为3线制（消除引线电阻）。测量引线电阻：3线制时两两测量，差值应<1Ω。',
                            tool: '万用表'
                        },
                        { 
                            title: '干扰测试', 
                            detail: '观察波动：如有50Hz周期性波动，为电磁干扰。断开传感器，短接输入，观察是否稳定（确认变送器正常）。',
                            tool: '示波器/趋势图'
                        },
                        { 
                            title: '校准验证', 
                            detail: '使用电阻箱模拟Pt100：输入100Ω应显示0℃，输入138.5Ω应显示100℃。如不准则变送器需校准。',
                            tool: '精密电阻箱'
                        }
                    ]
                },
                solutions: {

                },

            },
            
            // 压力变送器
            {
                id: 'pres-overload',

                code: 'OVERLOAD',

                rootCauses: [
                    {
                        type: '工艺超压',
                        probability: 50,
                        causes: [
                            '水锤冲击：泵启停或阀门快关产生压力波（可达正常压力3-5倍）',
                            '堵塞超压：取压管堵塞（冻结/结晶）导致静压传递至高压侧',
                            '操作失误：三阀组操作顺序错误（未开平衡阀直接开高压侧）',

                    },

                        type: '选型错误',

                    },
                    {
                        type: '安装问题',

                        causes: [
                            '单向受压：差压表单侧受压（三阀组内漏或误操作）',

                    repair: [

        // 渲染故障列表
        function renderFaultList() {
            const container = document.getElementById('fault-list');
            const filter = document.getElementById('category-filter').value;
            
            const filtered = filter === 'all' 
                ? faultDatabase 
                : faultDatabase.filter(f => f.category === filter);
            
            container.innerHTML = filtered.map(fault => `
                <div class="fault-card glass-panel p-4 rounded-xl severity-${fault.severity}" 
                     onclick="showDetail('${fault.id}')" id="card-${fault.id}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs font-mono text-slate-500 bg-slate-800 px-2 py-1 rounded">${fault.code}</span>
                            <span class="text-xs text-slate-400 ml-2">${fault.instrument}</span>
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${
                            fault.severity === 'critical' ? 'bg-red-500/20 text-red-400' :
                            fault.severity === 'high' ? 'bg-orange-500/20 text-orange-400' :
                            fault.severity === 'medium' ? 'bg-yellow-500/20 text-yellow-400' :
                            'bg-green-500/20 text-green-400'
                        }">
                            ${fault.severity === 'critical' ? '紧急' :
                              fault.severity === 'high' ? '高' :
                              fault.severity === 'medium' ? '中' : '低'}

                    <h3 class="font-bold text-white mb-2 text-sm">${fault.title}</h3>
                    <div class="flex items-center text-xs text-slate-400">
                        <i class="fas fa-chart-line mr-1"></i>
                        发生频率: ${fault.frequency}
                    </div>
                </div>
            `).join('');
        }

                        ${solutionsHTML}
                    </div>
                    
                    <!-- 成本 -->
                    ${costHTML}
                </div>
            `;
            
            // 滚动到顶部（移动端）
            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function filterFaults() {
            renderFaultList();
        }

        function exportFault(faultId) {
            const fault = faultDatabase.find(f => f.id === faultId);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fault, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `${fault.code}_Siemens_RCA.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function exportReport() {
            const allData = JSON.stringify(faultDatabase, null, 2);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(allData);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `西门子仪表故障根因分析知识库_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // 初始化
        renderFaultList();
    </script>
</body>
</html>
